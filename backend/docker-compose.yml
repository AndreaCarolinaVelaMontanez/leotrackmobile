version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leotrack-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - leotrack_data:/var/lib/postgresql/data

volumes:
  leotrack_data:
